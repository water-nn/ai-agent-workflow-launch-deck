<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">AI Agent workflow inspection board</title>
  <desc id="desc">A dark agent-lab presentation mock with agenda rail, stage frame, cards and delivery checks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#061224"/>
      <stop offset="0.52" stop-color="#080d1c"/>
      <stop offset="1" stop-color="#030712"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" x2="1">
      <stop offset="0" stop-color="#38f8ff"/>
      <stop offset="1" stop-color="#5cc8ff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" values="0 0 0 0 0.22 0 0 0 0 0.97 0 0 0 0 1 0 0 0 0.52 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="180" cy="90" r="260" fill="#38f8ff" opacity="0.12"/>
  <circle cx="1130" cy="160" r="310" fill="#8b5cf6" opacity="0.16"/>
  <circle cx="680" cy="780" r="360" fill="#27f5a7" opacity="0.08"/>
  <g opacity="0.16" stroke="#d6e3f1" stroke-width="1">
    <path d="M0 120H1280M0 240H1280M0 360H1280M0 480H1280M0 600H1280"/>
    <path d="M160 0V720M320 0V720M480 0V720M640 0V720M800 0V720M960 0V720M1120 0V720"/>
  </g>
  <rect x="68" y="74" width="190" height="572" rx="28" fill="#071122" opacity="0.86" stroke="#38f8ff" stroke-opacity="0.28"/>
  <text x="106" y="128" fill="#38f8ff" font-family="Arial, sans-serif" font-size="22" font-weight="700">Agenda</text>
  <g font-family="Arial, sans-serif" font-size="18" fill="#d6e3f1">
    <rect x="96" y="172" width="132" height="42" rx="12" fill="#38f8ff" opacity="0.18" stroke="#38f8ff" stroke-opacity="0.5"/>
    <text x="116" y="199">01  Goal</text>
    <text x="116" y="268" opacity="0.72">02  Skill</text>
    <text x="116" y="336" opacity="0.72">03  Media</text>
    <text x="116" y="404" opacity="0.72">04  QA</text>
    <text x="116" y="472" opacity="0.72">05  Deploy</text>
  </g>
  <rect x="308" y="74" width="900" height="572" rx="36" fill="#0a1328" opacity="0.88" stroke="#e2eefc" stroke-opacity="0.13"/>
  <path d="M342 142C505 88 660 196 810 136C930 88 1052 114 1170 76" fill="none" stroke="url(#cyan)" stroke-width="3" opacity="0.68" filter="url(#glow)"/>
  <text x="372" y="172" fill="#f6fbff" font-family="Arial, sans-serif" font-size="54" font-weight="800">Workflow Media Check</text>
  <text x="374" y="216" fill="#94a3b8" font-family="Arial, sans-serif" font-size="24">inspect, enlarge, play, pause, hand off</text>
  <g>
    <rect x="372" y="286" width="220" height="206" rx="24" fill="#0e1d38" stroke="#38f8ff" stroke-opacity="0.26"/>
    <text x="402" y="340" fill="#38f8ff" font-family="Arial, sans-serif" font-size="18" font-weight="700">Image</text>
    <rect x="402" y="366" width="158" height="82" rx="14" fill="#061224" stroke="#5cc8ff" stroke-opacity="0.35"/>
    <circle cx="438" cy="398" r="16" fill="#27f5a7" opacity="0.65"/>
    <path d="M416 428l42-34l38 30l24-20l40 32" fill="none" stroke="#38f8ff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g>
    <rect x="632" y="286" width="220" height="206" rx="24" fill="#0e1d38" stroke="#8b5cf6" stroke-opacity="0.28"/>
    <text x="662" y="340" fill="#a78bfa" font-family="Arial, sans-serif" font-size="18" font-weight="700">Video</text>
    <rect x="662" y="368" width="158" height="88" rx="14" fill="#061224" stroke="#8b5cf6" stroke-opacity="0.36"/>
    <path d="M730 390l48 26l-48 26z" fill="#38f8ff" opacity="0.82"/>
  </g>
  <g>
    <rect x="892" y="286" width="220" height="206" rx="24" fill="#0e1d38" stroke="#27f5a7" stroke-opacity="0.24"/>
    <text x="922" y="340" fill="#27f5a7" font-family="Arial, sans-serif" font-size="18" font-weight="700">Handoff</text>
    <path d="M922 382h150M922 416h120M922 450h162" stroke="#d6e3f1" stroke-opacity="0.54" stroke-width="10" stroke-linecap="round"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="18" fill="#cbd5e1">
    <text x="372" y="570">Modal blocks slide navigation</text>
    <text x="672" y="570">Esc closes first</text>
    <text x="928" y="570">Close pauses media</text>
  </g>
</svg>
